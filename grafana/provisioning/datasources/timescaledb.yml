apiVersion: 1

# Provisioned Postgres/TimescaleDB datasource. Connection values come from the
# HL_DB_* environment variables set on the grafana service in docker-compose.yml.
datasources:
  - name: TimescaleDB
    uid: hl_timescaledb
    type: postgres
    access: proxy
    url: ${HL_DB_HOST}:${HL_DB_PORT}
    user: ${HL_DB_USER}
    database: ${HL_DB_NAME}
    isDefault: true
    editable: false
    jsonData:
      sslmode: disable
      postgresVersion: 1700
      timescaledb: true
      maxOpenConns: 5
      maxIdleConns: 2
    secureJsonData:
      password: ${HL_DB_PASSWORD}
