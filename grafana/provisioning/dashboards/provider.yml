apiVersion: 1

# Auto-load every dashboard JSON under grafana/dashboards into the "hl-signals"
# folder. Files are watched, so edits show up without restarting Grafana.
providers:
  - name: hl-signals
    orgId: 1
    folder: hl-signals
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
